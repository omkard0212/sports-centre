server:
  port: 8081

spring:
  datasource:
    # Render provides MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD as env vars
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: SportsCenter
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

  data:
    redis:
      # Render provides REDIS_URL as env var (e.g. redis://red-xxxxx:6379)
      url: ${REDIS_URL}

jwt:
  secret: ${JWT_SECRET}
