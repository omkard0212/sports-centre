server:
  port: 8081

spring:
  datasource:
    # Reads from env var on Render, falls back to localhost for local dev
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/sports-center}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: SportsCenter
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      # Reads from env var on Render, falls back to localhost for local dev
      url: ${REDIS_URL:redis://localhost:6379}

jwt:
  secret: ${JWT_SECRET:f27dacd186810e78c0fd8ba65ecf3f1524ff087c5e86773d5172d424b3fd201f}
